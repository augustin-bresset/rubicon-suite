services:
  db_demo:
    image: postgres:13
    env_file: .env.demo
    volumes:
      - db_demo_data:/var/lib/postgresql/data
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  odoo_demo:
    image: odoo:18.0
    depends_on:
      - db_demo
    ports:
      - "127.0.0.1:8070:8069"
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
    volumes:
      - odoo_demo_data:/var/lib/odoo/.local/share/Odoo
      - ./rubicon_addons:/mnt/extra-addons
      - ./data/pictures:/mnt/extra-addons/pictures:ro
      - ./odoo_conf/odoo_demo.conf:/etc/odoo/odoo.conf:ro
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  db_demo_data:
  odoo_demo_data:
