# Template nginx pour le serveur demo — UTILISÉ UNIQUEMENT SI UN DOMAINE EST DISPONIBLE.
# Pour activer :
#   1. Remplacer YOUR_DOMAIN par votre domaine (ex: demo.rubicon.com)
#   2. sudo apt install nginx certbot python3-certbot-nginx
#   3. sudo certbot --nginx -d YOUR_DOMAIN
#   4. sudo cp ops/nginx_demo.conf /etc/nginx/sites-available/rubicon-demo
#   5. sudo ln -s /etc/nginx/sites-available/rubicon-demo /etc/nginx/sites-enabled/
#   6. sudo nginx -t && sudo systemctl reload nginx
#
# SANS DOMAINE : utiliser Cloudflare Tunnel (./ops/setup_cloudflare_tunnel.sh --service)

server {
    listen 80;
    server_name YOUR_DOMAIN;
    # Redirection HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name YOUR_DOMAIN;

    # Certificat Let's Encrypt (généré par certbot)
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    # Protocoles et ciphers sécurisés (TLS 1.2+ uniquement)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # HSTS (force HTTPS pour 1 an)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Taille max pour l'upload d'images (7GB de pictures dans la suite)
    client_max_body_size 100M;

    # Proxy vers Odoo demo
    location / {
        proxy_pass http://127.0.0.1:8070;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        # Timeouts adaptés pour Odoo
        proxy_connect_timeout 300s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }

    # Longpolling Odoo (si workers activés avec port 8072)
    # location /longpolling {
    #     proxy_pass http://127.0.0.1:8072;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_buffering off;
    #     proxy_read_timeout 3600s;
    # }

    # Healthcheck endpoint (pour monitoring externe)
    location /web/health {
        proxy_pass http://127.0.0.1:8070;
        access_log off;
    }
}
